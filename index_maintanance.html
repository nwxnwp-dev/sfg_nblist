<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปิดปรับปรุงชั่วคราว</title>
    <!-- เรียกใช้ฟอนต์ Kanit จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            /* พื้นหลังสีพาสเทลไล่เฉด */
            background: linear-gradient(135deg, #fceeea 0%, #fbd5e5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .maintenance-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
            text-align: center;
            max-width: 450px;
            width: 85%;
        }

        .mascot {
            font-size: 70px;
            margin-bottom: 10px;
            display: inline-block;
            /* แอนิเมชันขยับขึ้นลง */
            animation: bounce 2s infinite ease-in-out;
        }

        h1 {
            color: #ff8b94; /* สีชมพูอมส้ม */
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #777;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* ส่วนของจุดโหลดดุ๊กดิ๊ก */
        .loader {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #ffb6b9;
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        /* ตั้งค่าแอนิเมชัน */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="maintenance-box">
        <!-- เปลี่ยน Emoji ตรงนี้ได้ตามใจชอบ -->
        <div class="mascot">🛠️🐱</div>
        
        <h1>กำลังปิดปรับปรุงเว็บไซต์</h1>
        
        <p>
            ขออภัยในความไม่สะดวกนะคะ/ครับ <br> 
            ตอนนี้เรากำลังปัดกวาดเช็ดถูและอัปเกรดระบบอยู่ <br> 
            จะรีบกลับมาเปิดให้บริการอย่างไวที่สุดเลย!
        </p>
        
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>
</html>
